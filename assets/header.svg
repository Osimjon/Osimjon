<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="header example">
  <defs>
    <!-- тёплое золото, полупрозрачное — это "свет из-под панели" -->
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#d8bd85" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#c9a86a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c9a86a" stop-opacity="0"/>
    </radialGradient>

    <!-- тонкий тёплый блик по верхнему ребру панели ("металл") -->
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#c9a86a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e7d3a4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a86a" stop-opacity="0"/>
    </linearGradient>

    <filter id="blurLg"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="blurSm"><feGaussianBlur stdDeviation="2.4"/></filter>
  </defs>

  <!-- холст полностью прозрачный: заливки нет вообще -->

  <!-- свечение шире панели и уходит в прозрачность холста -->
  <rect x="90" y="10" width="720" height="150" rx="8"
        fill="url(#bloom)" filter="url(#blurLg)"/>

  <!-- сама панель — меньше холста, края панели не касаются краёв картинки -->
  <rect x="140" y="35" width="620" height="100" rx="6"
        fill="#0c0b0a" fill-opacity="0.92"/>

  <!-- тонкий световой блик по верхнему ребру панели -->
  <rect x="140" y="35" width="620" height="1.2" fill="url(#rim)"/>

  <!-- текст -->
  <text x="450" y="80" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="26" letter-spacing="6"
        fill="#ece6d8">OSIMJON</text>

  <text x="450" y="104" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="12.5" letter-spacing="1.5"
        fill="#9a9488">backend engineer</text>
</svg>
